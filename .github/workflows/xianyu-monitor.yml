name: 闲鱼降价监控

on:
  schedule:
    # 每天北京时间10点和22点运行
    - cron: '0 2,14 * * *'
  workflow_dispatch:  # 允许手动运行

# 添加写入权限，用于更新Issue
permissions:
  contents: write
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          pip install requests pygithub
      
      - name: 运行监控脚本
        run: python xianyu_monitor.py
        env:
          SEND_KEY: ${{ secrets.SEND_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 保存监控数据
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M:%S')"
          git push
